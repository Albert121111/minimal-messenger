<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#101010" />
    <title>Сообщения</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="boot-screen" class="boot-screen" aria-live="polite"><div><p class="eyebrow">MINIMAL MESSENGER</p><p>Загрузка сообщений…</p></div></main>
    <main id="auth-view" class="auth-wrap" hidden>
      <section class="auth-card">
        <p class="eyebrow">MINIMAL MESSENGER</p>
        <h1>Сообщения.<span>Просто.</span></h1>
        <p class="muted">Вход — и вся история уже с вами.</p>
        <form id="auth-form" novalidate>
          <label id="username-label">Юзернейм<input id="username" autocomplete="username" placeholder="например, alex_01" maxlength="24" /></label>
          <label>Эл. почта<input id="email" type="email" autocomplete="email" placeholder="you@example.com" required /></label>
          <label>Пароль<input id="password" type="password" autocomplete="current-password" placeholder="минимум 6 символов" minlength="6" required /></label>
          <button id="auth-submit" type="submit">Создать аккаунт</button>
        </form>
        <button id="switch-auth" class="text-button">Уже есть аккаунт? Войти</button>
        <p id="auth-message" class="form-message" aria-live="polite"></p>
      </section>
    </main>

    <main id="app-view" class="app-shell" hidden>
      <aside class="sidebar">
        <header class="sidebar-header">
          <div class="profile-summary"><p class="eyebrow">СООБЩЕНИЯ</p><strong id="my-username"></strong><small id="my-about"></small></div>
          <div class="sidebar-actions"><button id="profile-settings" class="icon-button" type="button" title="Статус профиля" aria-label="Статус профиля">⚙</button><button id="sign-out" class="icon-button" type="button" title="Выйти" aria-label="Выйти">↗</button></div>
        </header>
        <form id="profile-form" class="profile-form" hidden>
          <label>Статус<input id="profile-about" maxlength="120" placeholder="Например, на связи" autocomplete="off" /></label>
          <button type="submit">Сохранить статус</button>
        </form>
        <div class="search-wrap"><input id="user-search" type="search" placeholder="Найти по юзернейму" autocomplete="off" /></div>
        <p id="app-message" class="app-message" role="status" aria-live="polite" hidden></p>
        <div id="search-results" class="people-list"></div>
        <p class="section-label">ДИАЛОГИ</p>
        <div id="conversation-list" class="conversation-list"></div>
      </aside>

      <section class="chat-panel">
        <div id="empty-state" class="empty-state"><div><p class="eyebrow">ВАШИ СООБЩЕНИЯ</p><h2>Выберите диалог<br />или найдите человека.</h2></div></div>
        <div id="chat" class="chat" hidden>
          <header class="chat-header"><button id="mobile-back" class="mobile-back" type="button" aria-label="К списку диалогов">‹</button><strong id="chat-title"></strong><span id="chat-status">личный чат</span></header>
          <div id="message-list" class="message-list" aria-live="polite"></div>
          <form id="message-form" class="composer"><input id="message-input" maxlength="2000" placeholder="Напишите сообщение" autocomplete="off" /><button type="submit" aria-label="Отправить">↑</button></form>
        </div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js?v=4"></script>
  </body>
</html>
